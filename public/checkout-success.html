<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instill AI — Subscription Confirmed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/signal.css" />
  <style>
    .success-wrap {
      max-width: 560px; margin: 0 auto; padding: 80px 32px 120px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--signal-soft); border: 2px solid oklch(0.78 0.15 118 / 0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 32px;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .success-wrap h1 {
      font-size: clamp(28px, 5vw, 44px); font-weight: 500;
      letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 16px;
    }
    .success-wrap p {
      font-size: 16px; color: var(--ink-2); line-height: 1.6; margin-bottom: 40px;
    }
    .success-plan {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--signal-soft); border: 1px solid oklch(0.78 0.15 118 / 0.3);
      border-radius: var(--radius-lg); padding: 14px 24px; margin-bottom: 40px;
    }
    .success-plan-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--signal); flex-shrink: 0; }
    .success-plan-name { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--signal-ink); letter-spacing: 0.04em; }
    .success-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .manage-link { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-top: 28px; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
    .manage-link:hover { color: var(--ink); }
    .loading-state { color: var(--muted); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.06em; }
  </style>
</head>
<body>
<a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:0;z-index:300;padding:10px 18px;background:var(--ink);color:var(--paper);font-weight:600;font-size:14px;text-decoration:none;border-radius:0 0 8px 8px;">Skip to content</a>
<div class="shell">

  <header class="topbar">
    <a href="/home" class="brand">
      <span class="brand-mark"></span>
      <span class="brand-meta">Instill AI <span class="v">v2.0</span></span>
    </a>
    <nav class="nav" aria-label="Primary">
      <a href="/home">Overview</a>
      <a href="/integrations">Integrations</a>
      <a href="/tools">Tools</a>
      <a href="/roadmap">Roadmap</a>
      <a href="/pricing">Pricing</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/setup">Setup</a>
    </nav>
    <div class="top-actions">
      <button type="button" class="btn-theme" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">☾</button>
      <span class="status"><span class="dot"></span>Connected</span>
      <button type="button" onclick="logout()" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </header>

  <main id="main-content" style="flex:1;">
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <h1>You're all set.</h1>
      <p id="success-msg">Your subscription is confirmed. Your plan is now active.</p>

      <div class="success-plan" id="plan-badge" style="display:none;">
        <span class="success-plan-dot"></span>
        <span class="success-plan-name" id="plan-name">—</span>
        <span style="font-size:13px;color:var(--ink-2);">plan active</span>
      </div>

      <div class="success-actions">
        <a href="/dashboard" class="btn btn-signal btn-lg">Go to Dashboard <span class="arrow">→</span></a>
        <a href="/setup" class="btn btn-ghost btn-lg">Setup guide</a>
      </div>

      <button type="button" class="manage-link" id="portal-btn" style="display:none;" onclick="openPortal()">
        Manage billing &amp; invoices →
      </button>
    </div>
  </main>

</div>

<div class="toast-container" id="toast-container" aria-live="polite"></div>
<script src="/theme.js"></script>
<script>
  async function logout() {
    await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
    window.location.href = '/login';
  }

  function showToast(msg, type) {
    var c = document.getElementById('toast-container');
    var t = document.createElement('div');
    t.className = 'toast toast-' + (type || 'success');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 2600);
  }

  async function openPortal() {
    try {
      var res = await fetch('/api/checkout/portal', { method: 'POST', credentials: 'same-origin' });
      var data = await res.json();
      if (data.url) window.location.href = data.url;
      else showToast(data.error || 'Could not open billing portal.', 'error');
    } catch (e) {
      showToast('Could not open billing portal.', 'error');
    }
  }

  async function init() {
    var meRes = await fetch('/api/me', { credentials: 'same-origin' });
    if (meRes.status === 401) { window.location.href = '/login'; return; }
    var me = await meRes.json();

    var statusRes = await fetch('/api/checkout/status', { credentials: 'same-origin' });
    if (!statusRes.ok) return;
    var status = await statusRes.json();

    var planNames = { pro: 'Pro', team: 'Team', business: 'Business', free: 'Free' };
    var planEl = document.getElementById('plan-name');
    var badgeEl = document.getElementById('plan-badge');
    var msgEl = document.getElementById('success-msg');
    var portalBtn = document.getElementById('portal-btn');

    if (status.plan && status.plan !== 'free') {
      planEl.textContent = (planNames[status.plan] || status.plan) + ' Plan';
      badgeEl.style.display = 'inline-flex';
      msgEl.textContent = 'Your ' + (planNames[status.plan] || status.plan) + ' subscription is now active. Everything is ready to go.';
    }

    if (status.hasStripeCustomer) {
      portalBtn.style.display = 'inline-block';
    }
  }

  init();
</script>
</body>
</html>
